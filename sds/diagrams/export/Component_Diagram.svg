.5938 L1499.7432,613.5938 L1509.7432,613.5938 L1499.7432,603.5938" fill="#FAEEDA" style="stroke:#854F0B;stroke-width:0.5;"/><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="199.5801" x="1248" y="617.876">Single entry point for all HTTP requests.</text><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="220.3662" x="1248" y="629.5166">Handles: JWT token validation, rate limiting,</text><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="137.041" x="1248" y="641.1572">request routing, and CORS.</text><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="246.7432" x="1248" y="652.7979">All frontend clients (web + mobile) connect here.</text></g><g class="entity" data-qualified-name="GMN100" data-source-line="224" id="ent0101"><path d="M1297,1337.5938 L1297,1394.1563 L1557.3555,1394.1563 L1557.3555,1347.5938 L1547.3555,1337.5938 L1297,1337.5938" fill="#FAEEDA" style="stroke:#854F0B;stroke-width:0.5;"/><path d="M1547.3555,1337.5938 L1547.3555,1347.5938 L1557.3555,1347.5938 L1547.3555,1337.5938" fill="#FAEEDA" style="stroke:#854F0B;stroke-width:1;"/><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="237.168" x="1303" y="1351.876">Redis / in-memory cache supports offline mode</text><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="239.3555" x="1303" y="1363.5166">for Kahawa &amp; Ambalangoda branches with poor</text><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="161.9531" x="1303" y="1375.1572">internet connectivity (SRS &#167;2.4).</text><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="229.7266" x="1303" y="1386.7979">Automatically syncs with DB on reconnection.</text></g><g class="entity" data-qualified-name="GMN103" data-source-line="231" id="ent0104"><path d="M1679.5,1516.0938 L1679.5,1572.6563 L1930.3584,1572.6563 L1930.3584,1526.0938 L1920.3584,1516.0938 L1679.5,1516.0938" fill="#FAEEDA" style="stroke:#854F0B;stroke-width:0.5;"/><path d="M1920.3584,1516.0938 L1920.3584,1526.0938 L1930.3584,1526.0938 L1920.3584,1516.0938" fill="#FAEEDA" style="stroke:#854F0B;stroke-width:1;"/><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="226.2158" x="1685.5" y="1530.376">Central database shared across all branches.</text><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="174.6973" x="1685.5" y="1542.0166">Supports Ambalangoda Branch 01,</text><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="229.8584" x="1685.5" y="1553.6572">Ambalangoda Branch 02 and Kahawa Branch.</text><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="227.0264" x="1685.5" y="1565.2979">Hosted on AWS / Railway.app cloud platform.</text></g><g class="entity" data-qualified-name="GMN106" data-source-line="239" id="ent0107"><path d="M1564.5,74.5938 L1564.5,93.0938 L1529.32,97.0938 L1564.5,101.0938 L1564.5,119.5156 A0,0 0 0 0 1564.5,119.5156 L1829.6846,119.5156 A0,0 0 0 0 1829.6846,119.5156 L1829.6846,84.5938 L1819.6846,74.5938 L1564.5,74.5938 A0,0 0 0 0 1564.5,74.5938" fill="#FAEEDA" style="stroke:#854F0B;stroke-width:0.5;"/><path d="M1819.6846,74.5938 L1819.6846,84.5938 L1829.6846,84.5938 L1819.6846,74.5938" fill="#FAEEDA" style="stroke:#854F0B;stroke-width:0.5;"/><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="242.3584" x="1570.5" y="88.876">Customer places orders via phone or WhatsApp.</text><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="244.1846" x="1570.5" y="100.5166">Cashier enters order into system on their behalf.</text><text fill="#412402" font-family="Arial" font-size="10" lengthAdjust="spacing" textLe